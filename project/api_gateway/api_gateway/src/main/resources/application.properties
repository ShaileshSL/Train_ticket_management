spring.application.name=api_gateway
server: port: 8090 
spring: application: name : api-gateway 
cloud: gateway: routes: - id: user-service 
uri: lb://USER-SERVICE predicates: - Path=/api/user/** - id: train-service 
uri: lb://TRAIN-SERVICE predicates: - Path=/api/train/** - id: booking-service 
uri: lb://BOOKING-SERVICE predicates: - Path=/api/booking/** 
discovery: enabled: true 
eureka: client: service-url: defaultZone: http://localhost:8761/eureka