<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div>
                <h3 class="card-title">Form Title</h3>
            </div>
            <div class="card-body">
                <form class="form-group">
                    <div>
                        <label class="form-label">First Field</label>
                        <input type="text" class="form-control">
                        <div>
                            <span class="text-danger">Error message for first field</span>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Second Field</label>
                        <input type="text" class="form-control">
                        <div>
                            <span class="text-danger">Error message for second field</span>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Third Field</label>
                        <input type="text" class="form-control">
                        <div>
                            <span class="text-danger">Error message for third field</span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
